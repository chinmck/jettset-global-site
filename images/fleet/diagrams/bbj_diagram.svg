    <path d="M 55 100 Q 20 100 20 100 Q 55 55 190 50 L 790 50 Q 815 50 815 100 Q 815 150 790 150 L 190 150 Q 55 145 20 100 Z" />
    <path d="M 85 78 Q 130 58 165 78" opacity="0.6"/>
    <path d="M 85 122 Q 130 142 165 122" opacity="0.6"/>
    <!-- zone divider dashes -->
    <line x1="190" y1="50" x2="190" y2="150" stroke-dasharray="4 4" opacity="0.45"/>
    <line x1="330" y1="50" x2="330" y2="150" stroke-dasharray="4 4" opacity="0.45"/>
    <line x1="530" y1="50" x2="530" y2="150" stroke-dasharray="4 4" opacity="0.45"/>
    <line x1="670" y1="50" x2="670" y2="150" stroke-dasharray="4 4" opacity="0.45"/>

    <!-- Zone 1: forward galley -->
    <rect x="205" y="65" width="105" height="24" rx="3" opacity="0.55"/>
    <rect x="205" y="111" width="105" height="24" rx="3" opacity="0.55"/>

    <!-- Zone 2: conference / dining -->
    <rect x="345" y="68" width="70" height="30" rx="4"/>
    <rect x="345" y="112" width="70" height="30" rx="4"/>
    <rect x="430" y="80" width="85" height="40" rx="4" opacity="0.5"/>

    <!-- Zone 3: lounge sofa -->
    <rect x="545" y="66" width="110" height="34" rx="6"/>
    <rect x="545" y="110" width="110" height="34" rx="6"/>

    <!-- Zone 4: private suite (bed) -->
    <rect x="685" y="64" width="95" height="72" rx="6"/>
    <line x1="685" y1="88" x2="780" y2="88" opacity="0.5"/>
  </g>
  <path d="M 20 100 L 85 78 Q 68 100 85 122 Z" fill="#C9A24B" stroke="none" opacity="0.9"/>

  <g transform="translate(10,210)">
    <rect x="0" y="0" width="225" height="240" fill="none" stroke="#F5F3EF" stroke-width="1" opacity="0.4"/>
    <line x1="112" y1="0" x2="112" y2="240" stroke="#F5F3EF" stroke-width="1" stroke-dasharray="3 4" opacity="0.5"/>
    <circle cx="112" cy="120" r="105" fill="none" stroke="#F5F3EF" stroke-width="1.4" opacity="0.85"/>
    <circle cx="112" cy="120" r="95" fill="none" stroke="#F5F3EF" stroke-width="1" opacity="0.4"/>
    <g stroke="#F5F3EF" stroke-width="1.4" fill="none" opacity="0.85">
      <rect x="50" y="92" width="46" height="64" rx="6"/>
      <rect x="130" y="92" width="46" height="64" rx="6"/>
      <rect x="58" y="76" width="30" height="20" rx="4"/>
      <rect x="138" y="76" width="30" height="20" rx="4"/>

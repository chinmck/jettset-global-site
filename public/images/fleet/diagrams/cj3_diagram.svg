<svg viewBox="0 0 850 460" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="#F5F3EF" stroke-width="1.4" opacity="0.85">
    <!-- fuselage outline -->
    <path d="M 60 100 Q 20 100 20 100 Q 60 60 210 55 L 640 55 Q 675 55 675 100 L 675 100 Q 675 145 640 145 L 210 145 Q 60 140 20 100 Z" />
    <!-- nose accent curve lines (cockpit windshield) -->
    <path d="M 95 78 Q 140 60 175 78" opacity="0.6"/>
    <path d="M 95 122 Q 140 140 175 122" opacity="0.6"/>
    <!-- cabin door dashes -->
    <line x1="210" y1="55" x2="210" y2="145" stroke-dasharray="4 4" opacity="0.5"/>
    <!-- seat rows: club four -->
    <rect x="240" y="68" width="55" height="34" rx="4"/>
    <rect x="310" y="68" width="55" height="34" rx="4"/>
    <rect x="240" y="108" width="55" height="34" rx="4"/>
    <rect x="310" y="108" width="55" height="34" rx="4"/>
    <!-- aft pair -->
    <rect x="470" y="68" width="55" height="34" rx="4"/>
    <rect x="470" y="108" width="55" height="34" rx="4"/>
    <!-- small side table -->
    <rect x="390" y="90" width="40" height="20" rx="3" opacity="0.5"/>
    <!-- aft lavatory box -->
    <rect x="590" y="70" width="60" height="60" rx="3" opacity="0.6"/>
  </g>
  <!-- gold nose fill -->
  <path d="M 20 100 L 95 78 Q 80 100 95 122 Z" fill="#C9A24B" stroke="none" opacity="0.9"/>

  <!-- cross-section circle -->
  <g transform="translate(10,210)">
    <rect x="0" y="0" width="225" height="240" fill="none" stroke="#F5F3EF" stroke-width="1" opacity="0.4"/>
    <line x1="112" y1="0" x2="112" y2="240" stroke="#F5F3EF" stroke-width="1" stroke-dasharray="3 4" opacity="0.5"/>
    <circle cx="112" cy="120" r="105" fill="none" stroke="#F5F3EF" stroke-width="1.4" opacity="0.85"/>
    <circle cx="112" cy="120" r="95" fill="none" stroke="#F5F3EF" stroke-width="1" opacity="0.4"/>
    <!-- two seats -->
    <g stroke="#F5F3EF" stroke-width="1.4" fill="none" opacity="0.85">
      <rect x="55" y="95" width="42" height="60" rx="6"/>
      <rect x="128" y="95" width="42" height="60" rx="6"/>
      <rect x="62" y="80" width="28" height="20" rx="4"/>
      <rect x="135" y="80" width="28" height="20" rx="4"/>
    </g>
  </g>
</svg>
